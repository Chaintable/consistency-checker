listen: "0.0.0.0:8882"                                            # Default listening address
ready_ratio: 0.8                                                  # Default readiness ratio
check_num: 3                                                      # Default number of checks
check_interval_ms: 20                                             # Default interval for checks in milliseconds
chain_id: 1                                                       # Default Chain ID (e.g., 1)
version: "abc"
consistency_db_path: "/eth/consistency_db"                        # Default path for consistency database
outer_s3_bucket: "chaintable-pipeline"                            # Default inner S3 bucket name
outer_s3_region: "ap-northeast-1"                                 # Default inner S3 region
inner_brokers:                                                    # Default list of inner brokers
  - "b-1:9092"
inner_new_block_topic: "nodex_pipeline_1_abc"                         # Default topic for outer new blocks
inner_new_block_group_id: "consistency-group-1-abc"                   # Default group ID for new blocks in inner system
outer_brokers:                                                    # Default list of outer brokers
  - "b-1:9092"
outer_new_block_topic: "pipeline_1"                               # Default topic for outer new blocks

outer_version_new_block_topic: "pipeline_1_abc"

etcd_endpoints:
  - "127.0.0.1:2479"
  - "127.0.0.1:2579"
  - "127.0.0.1:2379"
available_nodes_ttl: 5