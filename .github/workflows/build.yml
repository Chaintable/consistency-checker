name: build

# CI + dev images. Versioned/release images are handled by release.yml (separate file).
# STANDARD = push-on-PR: PR builds AND push a SHA-tagged dev image, so you can
# `docker pull` the PR image and test it before merging. Do NOT gate the push off on PR.
#   - pull_request -> build + push a SHA-tagged dev image (+ manifest)
#   - workflow_dispatch -> same
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE_NAME: consistency-checkerx
  DOCKERFILE: Dockerfile

jobs:
  lint-test:
    name: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download deps
        run: go mod download

      - name: fmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -count=1 ./...

      - name: lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

  build:
    name: build-${{ matrix.arch }}
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest        # amd64 — free 4c16g on public repos
            arch: amd64
          - runner: ubuntu-24.04-arm      # arm64 — free 4c16g on public repos
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write        # REQUIRED — without it the OIDC role assume fails ("Could not load credentials")
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set revision (commit SHA)
        run: echo "REVISION=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Org-level secret (visibility=all). New Chaintable repos inherit it automatically.
          # The IAM role github-actions-ecr-public trusts repo:Chaintable/*:* and can push to public ECR.
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Public ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public          # REQUIRED for public.ecr.aws (default is private ECR login -> push 403)

      - name: Build & Push (per-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/${{ matrix.arch }}
          push: true                       # push-on-PR standard: PR pushes a SHA image you can pull + test. Do NOT gate this on `!= pull_request`.
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.REVISION }}-${{ matrix.arch }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          provenance: false
          sbom: false

  manifest:
    name: merge-manifest
    needs: build
    # No event gate: PR pushed per-arch images too (push-on-PR), so merge the manifest on PR as well.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set revision (commit SHA)
        run: echo "REVISION=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Public ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Merge multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${REGISTRY}/${IMAGE_NAME}:${REVISION} \
            ${REGISTRY}/${IMAGE_NAME}:${REVISION}-amd64 \
            ${REGISTRY}/${IMAGE_NAME}:${REVISION}-arm64

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.REVISION }}
