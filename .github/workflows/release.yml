name: release

# Versioned images, fired by a GitHub Release. The release TAG NAME becomes the image tag.
on:
  release:
    types: [published]

env:
  AWS_REGION: us-east-1
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE_NAME: consistency-checkerx
  DOCKERFILE: Dockerfile

jobs:
  lint-test:
    name: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download deps
        run: go mod download

      - name: fmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -count=1 ./...

      - name: lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

  build:
    name: build-${{ matrix.arch }}
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest        # amd64 — free 4c16g on public repos
            arch: amd64
          - runner: ubuntu-24.04-arm      # arm64 — free 4c16g on public repos
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set revision (release tag name)
        # GITHUB_REF is refs/tags/<tag> on a release event -> REVISION = <tag>. Use the git ref,
        # NOT github.event.release.tag_name, so re-runs stay stable.
        run: echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Public ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build & Push (per-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.REVISION }}-${{ matrix.arch }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          provenance: false
          sbom: false

  manifest:
    name: merge-manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set revision (release tag name)
        run: echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Public ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Merge multi-arch manifest + latest
        run: |
          docker buildx imagetools create \
            -t ${REGISTRY}/${IMAGE_NAME}:${REVISION} \
            -t ${REGISTRY}/${IMAGE_NAME}:latest \
            ${REGISTRY}/${IMAGE_NAME}:${REVISION}-amd64 \
            ${REGISTRY}/${IMAGE_NAME}:${REVISION}-arm64

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.REVISION }}
